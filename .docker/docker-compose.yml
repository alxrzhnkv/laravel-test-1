name: laravel-test-1

services:
  nginx:
    image: nginx:1.29
    restart: unless-stopped
    depends_on:
      - php
      - mysql
    environment:
      TZ: Europe/Moscow
    ports:
      - '8081:80'
    volumes:
      - ./nginx/volume/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/volume/var/log/nginx:/var/log/nginx
      - ../www:/var/www

  php:
    build:
      context: php-8.5
      target: prod
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
    volumes:
      - ../www:/var/www

  mysql:
    image: mysql:8.4
    user: mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./mysql-8.4/volume/var/lib/mysql:/var/lib/mysql
